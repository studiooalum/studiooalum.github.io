<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio OALUM Shop</title>

  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/variables.css">
  <link rel="stylesheet" href="./styles/layout.css">
  <link rel="stylesheet" href="./styles/shop.css">
  <link rel="stylesheet" href="./styles/cart.css">
  <link rel="stylesheet" href="./styles/gnb.css">
</head>
<body class="shop-page">
  <nav class="gnb gnb--shop">
    <a href="../index.html" class="gnb__back">← Home</a>
    <span class="gnb__title">Shop</span>
    <span class="gnb__spacer"></span>
  </nav>

  <header class="shop-header">
    <h1 class="shop-title">Shop</h1>
    <p class="shop-intro">작은 에디션 드롭. 제품을 눌러 넘버링 목록으로 이동하세요.</p>
    <p class="shop-count" id="shopCount">0 products</p>
  </header>

  <main class="shop-main">
    <section class="shop-grid" id="shopGrid" aria-live="polite"></section>
  </main>

  <script type="module" src="./scripts/shop.js"></script>
  <script type="module">
    import { initCartUIFromSrc } from "./scripts/cart.js";
    initCartUIFromSrc();
  </script>
</body>
</html>
