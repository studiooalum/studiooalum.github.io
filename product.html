<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://studiooalum.com/product">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:site_name" content="Studio OALUM">
  <meta property="og:title" content="Oalum Shop">
  <meta property="og:description" content="오알룸 샵의 넘버링 에디션 제품 상세를 살펴볼 수 있습니다.">
  <meta property="og:url" content="https://studiooalum.com/product">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Oalum Shop">
  <meta name="twitter:description" content="오알룸 샵의 넘버링 에디션 제품 상세를 살펴볼 수 있습니다.">
  <link rel="icon" type="image/png" href="./oalum_favicon.png">

  <link rel="stylesheet" href="./runtime/storefront/styles/reset.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/variables.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/layout.css?v=20260520-02">
  <link rel="stylesheet" href="./runtime/storefront/styles/product.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/cart.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/gnb.css">
</head>
<body class="product-page">
  <nav class="gnb gnb--shop">
    <a href="./shop" class="gnb__back" id="productBack">← Shop</a>
    <span class="gnb__title">Product</span>
  </nav>

  <main class="product-main">
    <section class="product-layout">
      <header class="product-overview">
        <div class="product-copy">
          <h1 class="product-title" id="productTitle">상품 소개</h1>
          <p class="product-intro" id="productIntro">넘버링 제품을 선택해 상세 페이지로 이동하세요.</p>
        </div>
        <div class="product-meta" id="productMeta">Loading...</div>
      </header>

      <section class="edition-grid" id="editionGrid" aria-live="polite"></section>
      <aside class="product-rail" aria-hidden="true"></aside>
    </section>
  </main>

  <script type="module" src="./runtime/storefront/scripts/product.js"></script>
  <script type="module">
    import { initSiteChrome } from "./runtime/storefront/scripts/components/siteChrome.js";
    import { initSiteFooter } from "./runtime/storefront/scripts/components/siteFooter.js?v=20260520-02";
    import { initCartUI } from "./runtime/storefront/scripts/cart.js";

    initSiteChrome();
    initCartUI();
    initSiteFooter();
  </script>
</body>
</html>
