<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio OALUM — 주문하기</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="./oalum_favicon.png">

  <link rel="stylesheet" href="./runtime/storefront/styles/reset.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/variables.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/layout.css?v=20260520-02">
  <link rel="stylesheet" href="./runtime/storefront/styles/checkout.css?v=20260520-03">
  <link rel="stylesheet" href="./runtime/storefront/styles/cart.css?v=20260520-01">
  <link rel="stylesheet" href="./runtime/storefront/styles/gnb.css">
</head>
<body class="checkout-page">
  <nav class="gnb gnb--shop">
    <a href="./shop.html" class="gnb__back">← 쇼핑</a>
    <span class="gnb__title">주문하기</span>
    <span class="gnb__spacer"></span>
  </nav>

  <main class="checkout-layout">
    <section class="checkout-summary">
      <h2 class="checkout-section-title">주문 내역</h2>
      <div class="checkout-items" id="checkoutItems"></div>
      <div class="checkout-totals">
        <div class="checkout-totals__row">
          <span>상품 합계</span>
          <span id="checkoutSubtotal">₩0</span>
        </div>
        <div class="checkout-totals__row">
          <span>배송비</span>
          <span id="checkoutShipping">무료</span>
        </div>
        <div class="checkout-totals__row checkout-totals__row--total">
          <span>총 결제금액</span>
          <span id="checkoutTotal">₩0</span>
        </div>
      </div>
    </section>

    <section class="checkout-form-section">
      <h2 class="checkout-section-title">배송 정보</h2>
      <form id="checkoutForm" class="checkout-form" novalidate>
        <div class="checkout-auth-panel" id="checkoutAuthPanel">
          <p class="checkout-auth-panel__headline" id="checkoutAuthHeadline">비회원 주문이 가능합니다.</p>
          <p class="checkout-auth-panel__copy" id="checkoutAuthCopy">로그인하면 기본 주소와 주문 내역을 계정에 연결할 수 있습니다.</p>
          <a href="./account.html" class="checkout-auth-panel__link" id="checkoutAuthLink">로그인 / 회원가입</a>
        </div>
        <div class="checkout-field">
          <label for="name">이름 <span class="required">*</span></label>
          <input type="text" id="name" name="name" required placeholder="홍길동" autocomplete="name" />
        </div>
        <div class="checkout-field">
          <label for="phone">연락처 <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" required placeholder="010-1234-5678" autocomplete="tel" />
        </div>
        <div class="checkout-field">
          <label for="emailLocal">이메일 <span class="required">*</span></label>
          <div class="checkout-email-row">
            <input type="text" id="emailLocal" name="emailLocal" required placeholder="example" inputmode="email" autocapitalize="none" spellcheck="false" />
            <span class="checkout-email-at" aria-hidden="true">@</span>
            <select id="emailDomainSelect" name="emailDomainSelect" aria-label="이메일 도메인 선택">
              <option value="">선택</option>
              <option value="naver.com">naver.com</option>
              <option value="gmail.com">gmail.com</option>
              <option value="daum.net">daum.net</option>
              <option value="hanmail.net">hanmail.net</option>
              <option value="kakao.com">kakao.com</option>
              <option value="outlook.com">outlook.com</option>
              <option value="hotmail.com">hotmail.com</option>
              <option value="icloud.com">icloud.com</option>
              <option value="custom">기타(직접 입력)</option>
            </select>
          </div>
          <input type="text" id="emailDomainCustom" name="emailDomainCustom" class="checkout-field__email-custom" placeholder="직접 도메인 입력" inputmode="email" autocapitalize="none" spellcheck="false" hidden />
          <input type="hidden" id="email" name="email" />
        </div>
        <div class="checkout-field-row">
          <div class="checkout-field checkout-field--zip">
            <label for="zipcode">우편번호 <span class="required">*</span></label>
            <div class="checkout-field__zip-row">
              <input type="text" id="zipcode" name="zipcode" required placeholder="12345" readonly />
              <button type="button" id="searchZipBtn" class="checkout-btn--outline">주소 검색</button>
            </div>
          </div>
        </div>
        <div class="checkout-field">
          <label for="address1">기본 주소 <span class="required">*</span></label>
          <input type="text" id="address1" name="address1" required placeholder="주소 검색을 이용해주세요" readonly />
        </div>
        <div class="checkout-field">
          <label for="address2">상세 주소</label>
          <input type="text" id="address2" name="address2" placeholder="동/호수, 층 등" autocomplete="address-line2" />
        </div>
        <div class="checkout-save-address" id="checkoutSaveAddressField" hidden>
          <label>
            <input type="checkbox" id="saveAsDefaultAddress" name="saveAsDefaultAddress" />
            <span>이번 배송지를 기본 주소지로 저장</span>
          </label>
        </div>
        <div class="checkout-field">
          <label for="memo">배송 메모</label>
          <select id="memo" name="memo">
            <option value="">선택 안함</option>
            <option value="문 앞에 놓아주세요">문 앞에 놓아주세요</option>
            <option value="경비실에 맡겨주세요">경비실에 맡겨주세요</option>
            <option value="배송 전 연락 바랍니다">배송 전 연락 바랍니다</option>
            <option value="부재 시 연락 바랍니다">부재 시 연락 바랍니다</option>
            <option value="custom">직접 입력</option>
          </select>
          <input type="text" id="memoCustom" name="memoCustom" class="checkout-field__memo-custom" placeholder="배송 메모를 입력해주세요" style="display:none;" />
        </div>
        <div class="checkout-divider"></div>
        <div class="checkout-agree">
          <label class="checkout-agree__item">
            <input type="checkbox" id="agreeTermsPrivacy" required />
            <span>주문 내용을 확인했으며, <button type="button" class="checkout-link" data-checkout-policy="terms">이용약관</button> 및 <button type="button" class="checkout-link" data-checkout-policy="privacy">개인정보 처리방침</button>에 동의합니다. <span class="required">*</span></span>
          </label>
        </div>
        <button type="submit" class="checkout-submit-btn" id="submitOrderBtn">결제 진행하기</button>
      </form>
    </section>
  </main>

  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script type="module" src="./runtime/storefront/scripts/checkout.js?v=20260520-04"></script>
  <script type="module">
    import { initSiteChrome } from "./runtime/storefront/scripts/components/siteChrome.js";
    import { initCartUI } from "./runtime/storefront/scripts/cart.js?v=20260520-01";

    initSiteChrome();
    initCartUI();
  </script>
</body>
</html>
