<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio OALUM — Sign Up</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="./oalum_favicon.png">

  <link rel="stylesheet" href="./runtime/storefront/styles/reset.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/variables.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/layout.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/account.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/cart.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/gnb.css">
</head>
<body class="account-page signup-page">
  <nav class="gnb gnb--account">
    <a href="./account.html" class="gnb__back">← Login</a>
    <span class="gnb__title">Sign Up</span>
  </nav>

  <main class="account-main">
    <section class="account-auth-shell account-auth-shell--signup">
      <section class="account-panel account-panel--signup">
        <h1 class="account-heading">회원가입</h1>
        <p class="account-copy">이메일과 비밀번호로 계정을 만들고 주문 내역, 기본 주소, 포인트를 관리할 수 있습니다.</p>
        <p class="account-status js-signup-status" role="status" aria-live="polite"></p>

        <form class="account-form js-signup-form" novalidate>
          <label class="account-field">
            <span>이름</span>
            <input type="text" name="fullName" autocomplete="name" inputmode="text" required />
          </label>
          <label class="account-field">
            <span>이메일 주소</span>
            <input type="email" name="email" autocomplete="email" inputmode="email" required />
          </label>
          <label class="account-field">
            <span>비밀번호</span>
            <input type="password" name="password" autocomplete="new-password" minlength="8" required />
          </label>
          <label class="account-field">
            <span>비밀번호 확인</span>
            <input type="password" name="passwordConfirm" autocomplete="new-password" minlength="8" required />
          </label>

          <div class="account-consent-list">
            <label class="account-checkbox">
              <input type="checkbox" name="privacyConsent" required />
              <span class="account-checkbox-copy">
                <strong>개인정보 처리방침에 동의합니다.</strong>
                <span class="account-consent-tag account-consent-tag--required">필수</span>
              </span>
            </label>
            <label class="account-checkbox">
              <input type="checkbox" name="termsConsent" required />
              <span class="account-checkbox-copy">
                <strong>이용약관에 동의합니다.</strong>
                <span class="account-consent-tag account-consent-tag--required">필수</span>
              </span>
            </label>
            <label class="account-checkbox">
              <input type="checkbox" name="marketingConsent" />
              <span class="account-checkbox-copy">
                <strong>마케팅 정보 수신에 동의합니다.</strong>
                <span class="account-consent-tag account-consent-tag--optional">선택</span>
              </span>
            </label>
          </div>

          <p class="account-copy account-copy--quiet">비밀번호는 8자 이상으로 설정해주세요.</p>
          <div class="account-panel-actions account-panel-actions--auth">
            <button type="submit" class="account-btn">회원가입</button>
            <a href="./account.html" class="account-btn account-btn--signup">로그인으로 돌아가기</a>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script type="module">
    import { initSiteChrome } from "./runtime/storefront/scripts/components/siteChrome.js";
    import { initSiteFooter } from "./runtime/storefront/scripts/components/siteFooter.js";
    import { initSignupPage } from "./runtime/storefront/scripts/signup.js";
    import { initCartUI } from "./runtime/storefront/scripts/cart.js";

    initSiteChrome();
    initCartUI();
    initSiteFooter();
    initSignupPage();
  </script>
</body>
</html>
