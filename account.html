<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio OALUM — Account</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="./oalum_favicon.png">

  <link rel="stylesheet" href="./runtime/storefront/styles/reset.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/variables.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/layout.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/account.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/cart.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/gnb.css">
</head>
<body class="account-page">
  <nav class="gnb gnb--account">
    <a href="./shop.html" class="gnb__back">← Shop</a>
    <span class="gnb__title">Account</span>
  </nav>

  <main class="account-main">
    <section class="account-auth-shell js-account-auth-shell">
      <section class="account-panel account-panel--login">
        <h1 class="account-heading">로그인</h1>
        <p class="account-copy">가입한 이메일과 비밀번호로 로그인하고 주문 내역, 워크숍 예약, 기본 주소, 포인트를 관리할 수 있습니다.</p>
        <p class="account-status js-account-login-status" role="status" aria-live="polite"></p>

        <form class="account-form js-account-login-form" novalidate>
          <label class="account-field">
            <span>이메일 주소</span>
            <input type="email" name="email" autocomplete="email" inputmode="email" required />
          </label>
          <label class="account-field">
            <span>비밀번호</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <div class="account-panel-actions account-panel-actions--auth">
            <button type="submit" class="account-btn">로그인</button>
            <a href="./signup.html" class="account-btn account-btn--signup">회원가입</a>
          </div>
        </form>
      </section>

      <section class="account-panel account-panel--guest">
        <h2 class="account-heading">비회원 주문확인</h2>
        <p class="account-copy">비회원은 별도 모드 없이 그대로 주문하면 됩니다. 여기서는 주문번호와 이메일로 현재 주문 상태만 확인하면 충분합니다.</p>
        <p class="account-status js-account-guest-status" role="status" aria-live="polite"></p>

        <form class="account-form js-account-guest-form" novalidate>
          <label class="account-field">
            <span>주문번호</span>
            <input type="text" name="orderId" autocomplete="off" required />
          </label>
          <label class="account-field">
            <span>이메일 주소</span>
            <input type="email" name="email" autocomplete="email" inputmode="email" required />
          </label>
          <button type="submit" class="account-btn">주문 확인</button>
        </form>

        <div class="account-guest-result js-account-guest-result" hidden></div>
      </section>
    </section>

    <section class="account-layout js-account-member-layout" data-account-protected hidden>
      <section class="account-panel">
        <h2 class="account-heading">내 계정 정보</h2>
        <p class="account-status js-account-member-status" role="status" aria-live="polite"></p>
        <form class="account-form js-account-profile-form">
          <label class="account-field">
            <span>이메일 주소</span>
            <input type="email" name="email" value="" readonly />
          </label>
          <label class="account-field">
            <span>이름</span>
            <input type="text" name="fullName" value="" autocomplete="name" />
          </label>
          <label class="account-field">
            <span>휴대전화</span>
            <input type="tel" name="phone" value="" autocomplete="tel" />
          </label>
          <label class="account-field">
            <span>우편번호</span>
            <input type="text" name="zipcode" value="" autocomplete="postal-code" />
          </label>
          <label class="account-field">
            <span>주소</span>
            <input type="text" name="address1" value="" autocomplete="address-line1" />
          </label>
          <label class="account-field">
            <span>상세 주소</span>
            <input type="text" name="address2" value="" autocomplete="address-line2" />
          </label>
          <div class="account-field">
            <span>로그인 방식</span>
            <div class="account-provider-chips js-account-identities"></div>
          </div>
          <div class="account-panel-actions">
            <button type="submit" class="account-btn">계정 업데이트</button>
            <button type="button" class="account-btn account-btn--secondary js-account-logout">로그아웃</button>
          </div>
        </form>
      </section>

      <section class="account-panel">
        <h2 class="account-heading">결제 내역</h2>
        <div class="account-orders js-account-orders">
          <div class="account-empty">등록된 주문 내역이 없습니다.</div>
        </div>
      </section>

      <section class="account-panel">
        <h2 class="account-heading">워크숍 예약</h2>
        <div class="account-orders js-account-workshops">
          <div class="account-empty">등록된 워크숍 예약 내역이 없습니다.</div>
        </div>
      </section>

      <section class="account-panel">
        <h2 class="account-heading">적립금</h2>
        <p class="account-points js-account-points">0 포인트</p>
        <p class="account-copy">상품 구매시 결제 금액의 3% 적립해드리며 1,000 포인트부터 사용 가능합니다.</p>
      </section>
    </section>
  </main>

  <script type="module">
    import { initSiteChrome } from "./runtime/storefront/scripts/components/siteChrome.js";
    import { initSiteFooter } from "./runtime/storefront/scripts/components/siteFooter.js";
    import { initAccountPage } from "./runtime/storefront/scripts/account.js";
    import { initCartUI } from "./runtime/storefront/scripts/cart.js";

    initSiteChrome();
    initCartUI();
    initSiteFooter();
    initAccountPage();
  </script>
</body>
</html>
