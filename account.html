<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio OALUM — Account</title>
  <link rel="icon" type="image/png" href="./oalum_favicon.png">

  <link rel="stylesheet" href="./runtime/storefront/styles/reset.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/variables.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/layout.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/account.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/cart.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/gnb.css">
</head>
<body class="account-page">
  <nav class="gnb gnb--account">
    <a href="./shop.html" class="gnb__back">← Shop</a>
    <span class="gnb__title">Account</span>
  </nav>

  <main class="account-main">
    <section class="account-layout">
      <section class="account-panel account-panel--auth">
        <h1 class="account-heading">회원가입 / 로그인</h1>
        <div class="account-auth">
          <p class="account-copy">회원은 구매 내역, 포인트, 기본 주소를 관리할 수 있고 비회원 주문도 같은 이메일이면 나중에 계정에 연결됩니다.</p>
          <p class="account-status js-account-status" role="status" aria-live="polite"></p>

          <section class="account-auth-social js-account-auth-social" hidden>
            <h2 class="account-subheading">간편 회원가입 / 로그인</h2>
            <div class="account-provider-grid js-account-provider-grid"></div>
            <div class="account-auth-divider js-account-auth-divider"><span>또는</span></div>
          </section>

          <form class="account-form js-account-request-form" novalidate>
            <h2 class="account-subheading">직접 가입 / 로그인</h2>
            <label class="account-field">
              <span>이름</span>
              <input type="text" name="fullName" autocomplete="name" inputmode="text" />
            </label>
            <label class="account-field">
              <span>이메일 주소</span>
              <input type="email" name="email" autocomplete="email" inputmode="email" required />
            </label>
            <button type="submit" class="account-btn">이메일 인증코드 받기</button>
          </form>

          <form class="account-form js-account-verify-form" hidden novalidate>
            <p class="account-copy account-auth-email">인증코드를 <strong class="js-account-email-display"></strong> 로 보냈습니다.</p>
            <label class="account-field">
              <span>6자리 인증코드</span>
              <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required />
            </label>
            <p class="account-auth-debug js-account-debug" hidden></p>
            <div class="account-auth-actions">
              <button type="submit" class="account-btn">로그인</button>
              <button type="button" class="account-btn account-btn--secondary js-account-reset">이메일 수정</button>
            </div>
          </form>

          <div class="account-authenticated js-account-authenticated" hidden>
            <p class="account-copy">로그인된 계정: <strong class="js-account-user-email"></strong></p>
            <button type="button" class="account-btn account-btn--secondary js-account-logout">로그아웃</button>
          </div>
        </div>
      </section>

      <section class="account-panel" data-account-protected hidden>
        <h2 class="account-heading">내 정보</h2>
        <form class="account-form js-account-profile-form">
          <label class="account-field">
            <span>이메일 주소</span>
            <input type="email" name="email" value="" readonly />
          </label>
          <label class="account-field">
            <span>이름</span>
            <input type="text" name="fullName" value="" autocomplete="name" />
          </label>
          <label class="account-field">
            <span>휴대전화</span>
            <input type="tel" name="phone" value="" autocomplete="tel" />
          </label>
          <label class="account-field">
            <span>우편번호</span>
            <input type="text" name="zipcode" value="" autocomplete="postal-code" />
          </label>
          <label class="account-field">
            <span>주소</span>
            <input type="text" name="address1" value="" autocomplete="address-line1" />
          </label>
          <label class="account-field">
            <span>상세 주소</span>
            <input type="text" name="address2" value="" autocomplete="address-line2" />
          </label>
          <div class="account-field">
            <span>연결 계정</span>
            <div class="account-provider-chips js-account-identities"></div>
          </div>
          <button type="submit" class="account-btn">계정 업데이트</button>
        </form>
      </section>

      <section class="account-panel" data-account-protected hidden>
        <h2 class="account-heading">결제 내역</h2>
        <div class="account-orders js-account-orders">
          <div class="account-empty">등록된 주문 내역이 없습니다.</div>
        </div>
      </section>

      <section class="account-panel" data-account-protected hidden>
        <h2 class="account-heading">적립금</h2>
        <p class="account-points js-account-points">0 포인트</p>
        <p class="account-copy">상품 구매시 결제 금액의 3% 적립해드리며 1,000 포인트부터 사용 가능합니다.</p>
      </section>
    </section>
  </main>

  <script type="module">
    import { initSiteChrome } from "./runtime/storefront/scripts/components/siteChrome.js";
    import { initAccountPage } from "./runtime/storefront/scripts/account.js";
    import { initCartUI } from "./runtime/storefront/scripts/cart.js";

    initSiteChrome();
    initCartUI();
    initAccountPage();
  </script>
</body>
</html>
