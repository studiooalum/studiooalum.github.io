<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio OALUM — Account</title>
  <link rel="icon" type="image/png" href="./oalum_favicon.png">

  <link rel="stylesheet" href="./runtime/storefront/styles/reset.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/variables.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/layout.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/account.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/cart.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/gnb.css">
</head>
<body class="account-page">
  <nav class="gnb gnb--account">
    <a href="./shop.html" class="gnb__back">← Shop</a>
    <span class="gnb__title">Account</span>
  </nav>

  <main class="account-main">
    <section class="account-layout">
      <section class="account-panel">
        <h1 class="account-heading">내 정보</h1>
        <form class="account-form">
          <label class="account-field">
            <span>아이디</span>
            <input type="text" value="" />
          </label>
          <label class="account-field">
            <span>이메일 주소</span>
            <input type="email" value="" />
          </label>
          <label class="account-field">
            <span>비밀번호 재설정</span>
            <input type="password" value="" />
          </label>
          <label class="account-field">
            <span>주소</span>
            <input type="text" value="" />
          </label>
          <label class="account-field">
            <span>휴대전화</span>
            <input type="tel" value="" />
          </label>
          <button type="button" class="account-btn">계정 업데이트</button>
        </form>
      </section>

      <section class="account-panel">
        <h2 class="account-heading">결제 내역</h2>
        <div class="account-empty">등록된 주문 내역이 없습니다.</div>
      </section>

      <section class="account-panel">
        <h2 class="account-heading">적립금</h2>
        <p class="account-points">1,000 포인트</p>
        <p class="account-copy">상품 구매시 결제 금액의 3% 적립해드리며 1,000 포인트부터 사용 가능합니다.</p>
      </section>
    </section>
  </main>

  <script type="module">
    import { initSiteChrome } from "./runtime/storefront/scripts/components/siteChrome.js";
    import { initCartUI } from "./runtime/storefront/scripts/cart.js";

    initSiteChrome();
    initCartUI();
  </script>
</body>
</html>
