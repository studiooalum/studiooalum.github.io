<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Single Thread Menu</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fff;
    font-family: 'GothamBook', sans-serif;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  /* 전체 묶음 */
  .menu-wrap {
    position: fixed;
    right: 54.5%;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 24px;
    z-index: 2;
  }

  nav.menu {
    display: flex;
    flex-direction: column;
    gap: 30px;
    text-align: left;
  }

  nav.menu a {
    font-size: 17px;
    text-decoration: none;
    color: #111;
    cursor: pointer;
    user-select: none;
  }
</style>
</head>

<body>

<div class="menu-wrap">
  <nav class="menu">
    <a href="#">About</a>
    <a href="#">Gallery</a>
    <a href="#">Shop</a>
    <a href="#">News Letter</a>
    <a href="#">Q&amp;A</a>
  </nav>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* ===== 물리 상수 ===== */
const GRAVITY = 0.5;
const FRICTION = 0.995;
const SEGMENTS = 100;

/* 실 스타일 */
const THREAD_COLOR = '#B11226';
const THREAD_WIDTH = 2;

/* ===== Point ===== */
class Point {
  constructor(x, y, fixed = false) {
    this.x = x;
    this.y = y;
    this.oldX = x;
    this.oldY = y;
    this.fixed = fixed;
  }

  update() {
    if (this.fixed) return;

    const vx = (this.x - this.oldX) * FRICTION;
    const vy = (this.y - this.oldY) * FRICTION;

    this.oldX = this.x;
    this.oldY = this.y;

    this.x += vx;
    this.y += vy + GRAVITY;
  }
}

/* ===== Thread ===== */
class Thread {
  constructor(x) {
    this.segmentLength = canvas.height / (SEGMENTS - 1);
    this.points = [];

    for (let i = 0; i < SEGMENTS; i++) {
      this.points.push(
        new Point(x, i * this.segmentLength, i === 0)
      );
    }
  }

  applyForce(strength = 8) {
    for (let i = 6; i < this.points.length; i++) {
      this.points[i].x +=
        (Math.random() - 0.5) * strength * (i / this.points.length);
    }
  }

  constrain() {
    for (let i = 0; i < this.points.length - 1; i++) {
      const p1 = this.points[i];
      const p2 = this.points[i + 1];

      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const diff = (dist - this.segmentLength) / dist;

      if (!p1.fixed) {
        p1.x += dx * diff * 0.5;
        p1.y += dy * diff * 0.5;
      }
      if (!p2.fixed) {
        p2.x -= dx * diff * 0.5;
        p2.y -= dy * diff * 0.5;
      }
    }
  }

  update() {
    this.points.forEach(p => p.update());
    for (let i = 0; i < 6; i++) this.constrain();
  }

  draw() {
    ctx.beginPath();
    ctx.moveTo(this.points[0].x, this.points[0].y);
    for (let i = 1; i < this.points.length; i++) {
      ctx.lineTo(this.points[i].x, this.points[i].y);
    }
    ctx.strokeStyle = THREAD_COLOR;
    ctx.lineWidth = THREAD_WIDTH;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}

/* ===== 실 위치: 메뉴 기준 ===== */
const menuWrap = document.querySelector('.menu-wrap');
const rect = menuWrap.getBoundingClientRect();
const threadX = rect.left + rect.width + 50;

/* 한 가닥 실 */
const thread = new Thread(threadX);

/* 메뉴 hover → 실 반응 */
document.querySelectorAll('.menu a').forEach(link => {
  link.addEventListener('mouseenter', () => {
    thread.applyForce(10);
  });
});

/* 마우스 근접 반응 */
window.addEventListener('mousemove', e => {
  const p = thread.points[thread.points.length - 1];
  const dx = e.clientX - p.x;
  if (Math.abs(dx) < 50) {
    p.x += dx * 0.07;
  }
});

/* ===== 애니메이션 ===== */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  thread.update();
  thread.draw();
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
