<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio OALUM — Shop</title>
    <link rel="stylesheet" href="./v1/src/styles/reset.css">
    <link rel="stylesheet" href="./v1/src/styles/variables.css">
    <link rel="stylesheet" href="./v1/src/styles/layout.css">
    <link rel="stylesheet" href="./v1/src/styles/shop.css">
    <link rel="stylesheet" href="./v1/src/styles/cart.css">
    <link rel="stylesheet" href="./v1/src/styles/gnb.css">
</head>
<body class="shop-page">
    <nav class="gnb gnb--shop">
      <a href="./index.html" class="gnb__back">← Home</a>
      <span class="gnb__title">Shop</span>
      <div class="gnb__actions" id="gnbActions">
        <a href="#" class="gnb__action">Search</a>
        <a href="#" class="gnb__action">Login</a>
        <button type="button" class="gnb__action gnb__action--button">Cart</button>
      </div>
    </nav>

    <div class="shop-tags" id="shopTags" aria-label="Shop categories"></div>

    <main class="shop-main">
      <section class="shop-shell">
        <div class="shop-content">
          <section class="shop-grid" id="shopGrid" aria-live="polite"></section>
        </div>
        <aside class="shop-rail" aria-hidden="true"></aside>
      </section>
    </main>

    <script type="module" src="./v1/src/scripts/shop.js"></script>
    <script type="module">
      import { initSiteChrome } from "./v1/src/scripts/components/siteChrome.js";
      import { initCartUI } from "./v1/src/scripts/cart.js";

      initSiteChrome({ title: "Shop", backHref: "index.html", backLabel: "← Home" });
      initCartUI();
    </script>
</body>
</html>
