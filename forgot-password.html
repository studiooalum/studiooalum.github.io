<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studio OALUM — 비밀번호 찾기</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="./oalum_favicon.png">

  <link rel="stylesheet" href="./runtime/storefront/styles/reset.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/variables.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/layout.css?v=20260520-02">
  <link rel="stylesheet" href="./runtime/storefront/styles/account.css?v=20260520-01">
  <link rel="stylesheet" href="./runtime/storefront/styles/cart.css">
  <link rel="stylesheet" href="./runtime/storefront/styles/gnb.css">
</head>
<body class="account-page forgot-password-page">
  <nav class="gnb gnb--account">
    <a href="./account.html" class="gnb__back">← 로그인</a>
    <span class="gnb__title">비밀번호 찾기</span>
  </nav>

  <main class="account-main">
    <section class="account-auth-shell account-auth-shell--recovery">
      <section class="account-panel account-panel--recovery">
        <h1 class="account-heading">비밀번호 찾기</h1>
        <p class="account-copy">가입한 이메일로 인증코드를 보내드리고 새 비밀번호를 다시 설정할 수 있습니다.</p>
        <p class="account-status js-password-reset-request-status" role="status" aria-live="polite"></p>

        <form class="account-form js-password-reset-request-form" novalidate>
          <label class="account-field">
            <span>이메일 주소</span>
            <input type="email" name="email" autocomplete="email" inputmode="email" required />
          </label>
          <div class="account-panel-actions account-panel-actions--auth">
            <button type="submit" class="account-btn">인증코드 받기</button>
            <a href="./account.html" class="account-btn account-btn--signup">로그인으로 돌아가기</a>
          </div>
        </form>

        <section class="account-phase js-password-reset-confirm-panel" hidden>
          <p class="account-copy js-password-reset-email-copy"></p>
          <p class="account-status js-password-reset-confirm-status" role="status" aria-live="polite"></p>
          <p class="account-debug-code js-password-reset-debug" hidden></p>

          <form class="account-form js-password-reset-confirm-form" novalidate>
            <label class="account-field">
              <span>인증코드</span>
              <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required />
            </label>
            <label class="account-field">
              <span>새 비밀번호</span>
              <input type="password" name="password" autocomplete="new-password" minlength="8" required />
            </label>
            <p class="account-field-note">새 비밀번호는 8자 이상으로 입력해주세요. 영문, 숫자, 기호를 함께 쓰면 더 안전합니다.</p>
            <label class="account-field">
              <span>새 비밀번호 확인</span>
              <input type="password" name="passwordConfirm" autocomplete="new-password" minlength="8" required />
            </label>
            <div class="account-panel-actions account-panel-actions--auth">
              <button type="submit" class="account-btn">비밀번호 재설정</button>
            </div>
          </form>
        </section>
      </section>
    </section>
  </main>

  <script type="module">
    import { initSiteChrome } from "./runtime/storefront/scripts/components/siteChrome.js";
    import { initSiteFooter } from "./runtime/storefront/scripts/components/siteFooter.js?v=20260520-02";
    import { initForgotPasswordPage } from "./runtime/storefront/scripts/forgot-password.js?v=20260520-01";
    import { initCartUI } from "./runtime/storefront/scripts/cart.js";

    initSiteChrome();
    initCartUI();
    initSiteFooter();
    initForgotPasswordPage();
  </script>
</body>
</html>
